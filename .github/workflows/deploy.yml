name: 2. Build & Deploy App

on:
  push:
    branches:
      - main
    paths-ignore:
      - "terraform/**"   # skip if only terraform files changed
      - ".github/**"     # skip if only workflow files changed
  workflow_dispatch:     # allows manual trigger after infra is ready

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }} # use commit SHA so every deploy is unique/traceable

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Read infra values from SSM (set by infra.yml after terraform apply)
      - name: Load infra values from SSM
        run: |
          ECR_URI=$(aws ssm get-parameter \
            --name "/imagify/dev/ecr_repository_url" \
            --query "Parameter.Value" \
            --output text)

          ECS_CLUSTER=$(aws ssm get-parameter \
            --name "/imagify/dev/ecs_cluster" \
            --query "Parameter.Value" \
            --output text)

          ECS_SERVICE=$(aws ssm get-parameter \
            --name "/imagify/dev/ecs_service" \
            --query "Parameter.Value" \
            --output text)

          echo "ECR_URI=$ECR_URI" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV

          echo "ECR: $ECR_URI"
          echo "ECS Cluster: $ECS_CLUSTER / Service: $ECS_SERVICE"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build -t imagify:${{ env.IMAGE_TAG }} .

      - name: Tag Docker image
        run: |
          docker tag imagify:${{ env.IMAGE_TAG }} ${{ env.ECR_URI }}:${{ env.IMAGE_TAG }}
          docker tag imagify:${{ env.IMAGE_TAG }} ${{ env.ECR_URI }}:latest

      - name: Push Docker image to ECR
        run: |
          docker push ${{ env.ECR_URI }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_URI }}:latest

      - name: Update ECS service with new image
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      # Wait for deployment to stabilize (optional but recommended)
      - name: Wait for ECS deployment to complete
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "Deployment complete!"

      # Get ALB DNS name so you know where to access the app
      - name: Get ALB endpoint
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names imagify-alb \
            --region us-east-1 \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "✅ App is accessible at: http://$ALB_DNS"
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV

      - name: Deployment summary
        run: |
          echo "================================================"
          echo "🚀 Deployment complete!"
          echo "📦 Image: ${{ env.ECR_URI }}:${{ env.IMAGE_TAG }}"
          echo "🌐 URL: http://${{ env.ALB_DNS }}"
          echo "================================================"
