name: Deploy Imagify to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: latest

jobs:
  deploy:
    name: Deploy ECS Fargate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 4. Terraform Init
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # 5. Terraform Apply (using GitHub Secrets instead of .tfvars)
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "mongodb_url=${{ secrets.MONGODB_URL }}" \
            -var "clerk_publishable_key=${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            -var "clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}" \
            -var "cloudinary_api_key=${{ secrets.CLOUDINARY_API_KEY }}" \
            -var "cloudinary_api_secret=${{ secrets.CLOUDINARY_API_SECRET }}" \
            -var "stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var "stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}"

      # 6. Get ECR repo URI from Terraform output
      - name: Get ECR repository URI
        id: ecr
        run: |
          ECR_URI=$(terraform output -raw ecr_repository_url)
          echo "ECR_URI=$ECR_URI" >> $GITHUB_ENV

      # 7. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 8. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t imagify:${{ env.IMAGE_TAG }} .

      # 9. Tag Docker image with ECR URI
      - name: Tag Docker image
        run: |
          docker tag imagify:${{ env.IMAGE_TAG }} $ECR_URI:${{ env.IMAGE_TAG }}

      # 10. Push Docker image to ECR
      - name: Push Docker image to ECR
        run: |
          docker push $ECR_URI:${{ env.IMAGE_TAG }}

      # 11. Update ECS service to deploy new image
      - name: Update ECS Service
        run: |
          ECS_CLUSTER=$(terraform output -raw aws_ecs_cluster)
          ECS_SERVICE=$(terraform output -raw aws_ecs_service)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
